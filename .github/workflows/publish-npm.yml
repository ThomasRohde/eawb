name: Publish to npm

on:
  push:
    branches: [master]
    paths:
      - 'packages/cli/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24+ required: the runtime uses `node:sqlite` (unflagged in
          # Node 24, RC in Node 25). The CLI package.json declares
          # `engines.node: >=24.0.0` and `engine-strict` is on in .npmrc, so
          # older Node fails install with EBADENGINE.
          node-version: 24
          cache: npm

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Check if version changed
        id: version-check
        working-directory: packages/cli
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED_VERSION → $LOCAL_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $LOCAL_VERSION"
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.changed == 'true'
        run: npm ci

      - name: Build (full monorepo, dependency-ordered)
        if: steps.version-check.outputs.changed == 'true'
        run: npm run build

      - name: Publish
        if: steps.version-check.outputs.changed == 'true'
        working-directory: packages/cli
        run: npm publish --access public
